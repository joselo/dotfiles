# Terminal is in 256 color mode by default
set -g default-terminal "screen-256color"

# Set vim mode keys
set-window-option -g mode-keys vi

# First window is window 1
set -g base-index 1

# Set the prefix for tmux to ^A
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Pane movement
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Pane resize
bind-key H resize-pane -L 5
bind-key J resize-pane -D 5
bind-key K resize-pane -U 5
bind-key L resize-pane -R 5
bind-key < resize-pane -L
bind-key - resize-pane -D
bind-key + resize-pane -U
bind-key > resize-pane -R

# Don't use delay
# set -s escape-time 0

# Basic Theme
set -g pane-active-border-fg cyan
set -g pane-border-fg "colour239"

set -g message-fg black
set -g message-bg cyan

set -g status-justify left
set -g status-bg "colour236"
set -g status-fg white 

setw -g clock-mode-colour cyan

setw -g status-left " #S "
setw -g status-left-fg black
setw -g status-left-bg cyan

set -g status-right-length "100"
set -g status-right "#[bg=colour239] %a %B %-d, %Y #[fg=cyan].:. #[fg=white]%H:%M #[fg=black,bg=cyan] #h "

setw -g window-status-format " #I: #W "
setw -g window-status-separator ""
setw -g window-status-fg cyan

setw -g window-status-current-format " #I: #W "
setw -g window-status-current-fg white
setw -g window-status-current-bg "colour239"

setw -g window-status-bell-fg "colour9" 
setw -g window-status-activity-fg yellow

# Reload my configuration

bind-key r source-file ~/.tmux.conf
source-file ~/.tmux/mouse-off.tmux
